<!DOCTYPE html>
<html>
<head>
  <title>Tower</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1 id="title">Loading...</h1>

<div id="content" class="card"></div>

<script src="data.js"></script>
<script src="script.js"></script>

<script>
const params = new URLSearchParams(window.location.search);
const rank = Number(params.get("rank"));

const tower = (window.completions || []).find(t => t.rank === rank);

const content = document.getElementById("content");

if (!tower) {
  document.getElementById("title").innerText = "Tower not found";
  content.innerHTML = "Invalid tower ID.";
} else {
  document.getElementById("title").innerText = `#${tower.rank} ${tower.name}`;

  const victors = (tower.victors || []).join(", ");

  content.innerHTML = `
    <div>
      <p><b>Difficulty:</b> ${tower.difficulty}</p>
      <p><b>Victors:</b> ${victors}</p>
      <p><b>List Points:</b> ${(typeof getPoints === "function") ? getPoints(tower.rank) : "N/A"}</p>
    </div>
  `;

  if (tower.video) {
    content.innerHTML += `
      <div style="margin-top:15px;">
        <iframe width="100%" height="400"
          src="${tower.video}"
          frameborder="0"
          allowfullscreen>
        </iframe>
      </div>
    `;
  }
}
</script>

</body>
</html>
