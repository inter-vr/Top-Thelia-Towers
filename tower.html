<script src="data.js"></script>
<script src="script.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const params = new URLSearchParams(window.location.search);
  const rank = Number(params.get("rank"));

  const tower = (window.completions || []).find(t => t.rank === rank);

  const title = document.getElementById("title");
  const content = document.getElementById("content");

  if (!tower) {
    title.innerText = "Tower not found";
    content.innerHTML = "<p>Invalid tower ID.</p>";
    return;
  }

  title.innerText = `#${tower.rank} ${tower.name}`;

  const victors = (tower.victors || []).join(", ");
  const pts = (typeof getPoints === "function") ? getPoints(tower.rank) : 0;

  content.innerHTML = `
    <p><b>Difficulty:</b> ${tower.difficulty}</p>
    <p><b>Victors:</b> ${victors}</p>
    <p><b>List Points:</b> ${pts}</p>
  `;

  if (tower.video) {
    content.innerHTML += `
      <div style="margin-top:15px;">
        <iframe width="100%" height="400"
          src="${tower.video}"
          frameborder="0"
          allowfullscreen>
        </iframe>
      </div>
    `;
  }
});
</script>
