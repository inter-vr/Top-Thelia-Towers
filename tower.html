<!DOCTYPE html>
<html>
<head>
  <title>Tower</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1 id="title">Loading...</h1>

<div class="topbar">
  <a href="list.html">List</a>
  <a href="leaderboard.html">Leaderboard</a>
</div>

<div id="content" class="card"></div>

<script src="data.js"></script>
<script src="script.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const params = new URLSearchParams(window.location.search);
  const rank = Number(params.get("rank"));

  const tower = (window.completions || []).find(t => t.rank === rank);

  const title = document.getElementById("title");
  const content = document.getElementById("content");

  if (!tower) {
    title.innerText = "Tower not found";
    content.innerHTML = "<p>Invalid tower ID.</p>";
    return;
  }

  title.innerText = `#${tower.rank} ${tower.name}`;

  const victors = (tower.victors || []).join(", ");
  const pts = window.getPoints ? window.getPoints(tower.rank) : 0;

  content.innerHTML = `
    <div>
      <p><b>Rank:</b> #${tower.rank}</p>
      <p><b>Name:</b> ${tower.name}</p>
      <p><b>Difficulty:</b> ${tower.difficulty}</p>
      <p><b>Victors:</b> ${victors}</p>
      <p><b>List Points:</b> ${pts}</p>
    </div>
  `;

  if (tower.video) {
    content.innerHTML += `
      <div style="margin-top:15px;">
        <iframe width="100%" height="400"
          src="${tower.video}"
          frameborder="0"
          allowfullscreen>
        </iframe>
      </div>
    `;
  }
});
</script>

</body>
</html>
