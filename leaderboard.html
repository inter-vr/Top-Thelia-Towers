<!DOCTYPE html>
<html>
<head>
  <title>Leaderboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Leaderboard</h1>

<div class="topbar">
  <a href="list.html">List</a>
  <a href="leaderboard.html">Leaderboard</a>
</div>

<div id="leaderboard"></div>

<!-- IMPORTANT: load data first -->
<script src="data.js"></script>
<script src="script.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {
  // safety check (prevents blank page bugs)
  if (!window.completions || !Array.isArray(window.completions)) {
    document.getElementById("leaderboard").innerHTML =
      "<div class='card'>Error: completions data failed to load.</div>";
    return;
  }

  if (typeof buildLeaderboard !== "function") {
    document.getElementById("leaderboard").innerHTML =
      "<div class='card'>Error: leaderboard function missing.</div>";
    return;
  }

  buildLeaderboard();
});
</script>

</body>
</html>
